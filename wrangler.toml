name               = "nhs-triggers"
main               = "index.js"
compatibility_date = "2024-01-01"

# ── Custom domain routes ─────────────────────────────────────────────────────
# Only handle the two API paths — GET /nhs falls through to the app worker
# which serves the HTML page. More specific patterns beat app.eno.solutions/*.
routes = [
  { pattern = "app.eno.solutions/nhs/status", zone_name = "eno.solutions" },
  { pattern = "app.eno.solutions/nhs/update", zone_name = "eno.solutions" }
]

# ── Environment variables ────────────────────────────────────────────────────
# Non-secret config can go here. Secrets must be set via:
#   wrangler secret put ZOOM_ACCOUNT_ID
#   wrangler secret put ZOOM_CLIENT_ID
#   wrangler secret put ZOOM_CLIENT_SECRET
#   wrangler secret put ZOOM_MSO_VARIABLE_ID
#   wrangler secret put ZOOM_PROVIDER_VARIABLE_ID
#
# Or set all five in the Cloudflare dashboard:
#   Workers & Pages → nhs-triggers → Settings → Variables and Secrets


