name               = "nhs-triggers"
main               = "index.js"
compatibility_date = "2024-01-01"

# ── Custom domain route ──────────────────────────────────────────────────────
# Serves the worker at https://api.eno.solutions/nhs (and /nhs/update)
# The zone_name must match the domain you have in your Cloudflare account.
routes = [
  { pattern = "api.eno.solutions/nhs*", zone_name = "eno.solutions" }
]

# ── Environment variables ────────────────────────────────────────────────────
# Non-secret config can go here. Secrets must be set via:
#   wrangler secret put ZOOM_ACCOUNT_ID
#   wrangler secret put ZOOM_CLIENT_ID
#   wrangler secret put ZOOM_CLIENT_SECRET
#   wrangler secret put ZOOM_MSO_VARIABLE_ID
#   wrangler secret put ZOOM_PROVIDER_VARIABLE_ID
#
# Or set all five in the Cloudflare dashboard:
#   Workers & Pages → nhs-triggers → Settings → Variables and Secrets


